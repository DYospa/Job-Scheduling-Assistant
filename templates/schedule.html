{% extends "base.html" %}
{% block title %}Schedule{% endblock %}

{% block content %}
<h2 class="mb-4">📅 Daily Schedule</h2>

<div class="card shadow-sm p-3 mb-4">
    <form method="GET" action="/schedule" class="row g-2 align-items-end">
        <div class="col-md-4">
            <label class="form-label">Select Date</label>
            <input type="date" name="date" class="form-control" required>
        </div>
        <div class="col-md-2">
            <button class="btn btn-warning w-100">View</button>
        </div>
    </form>
</div>

<div class="card shadow-sm p-3">
    <h5 class="mb-3">Scheduled Jobs</h5>

    {% if jobs %}
        <table class="table table-striped mb-0">
            <thead>
                <tr>
                    <th>Job</th>
                    <th>Start</th>
                    <th>End</th>
                </tr>
            </thead>
            <tbody>
            {% for job in jobs %}
                <tr>
                    <td>{{ job.title }}</td>
                    <td>{{ job.start_time }}</td>
                    <td>{{ job.end_time }}</td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p class="text-muted mb-0">No jobs found.</p>
    {% endif %}
</div>
{% endblock %}
